<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ultimate Utility Hub</h1>
    <div class="menu">
        <button>🧮 Calculator</button>
        <button>🔬 Scientific</button>
        <button>📏 Converter</button>
        <button>📈 Graph</button>
    
    </div>

    <div class="calculator">
        <input type="text" id="display" readonly>

        <button onclick="addToDisplay('7')">7</button>
        <button onclick="addToDisplay('8')">8</button>
        <button onclick="addToDisplay('9')">9</button>
        <button onclick="addToDisplay('/')">/</button>

        <button onclick="addToDisplay('4')">4</button>
        <button onclick="addToDisplay('5')">5</button>
        <button onclick="addToDisplay('6')">6</button>
        <button onclick="addToDisplay('*')">*</button>

        <button onclick="addToDisplay('1')">1</button>
        <button onclick="addToDisplay('2')">2</button>
        <button onclick="addToDisplay('3')">3</button>
        <button onclick="addToDisplay('-')">-</button>

       <button onclick="addToDisplay('0')">0</button>
       <button onclick="addToDisplay('.')">.</button>
       <button onclick="backspace()">⌫</button>
       <button onclick="addToDisplay('+')">+</button>

       <button onclick="clearDisplay()">C</button>
       <button onclick="calculate()">=</button>
       <select onchange="changeTheme(this.value)">
            <option value="light">☀️ Light</option>
            <option value="dark">🌙 Dark</option>
            <option value="ocean">🌊 Ocean</option>
            <option value="neon">⚡ Neon</option>
            
        </select>
       
    </div>
    <div class="scientific-section">
        <h2>🔬 Scientific Calculator</h2>

        <button onclick="squareRoot()">√</button>
        <button onclick="square()">x²</button>
        <button onclick="cube()">x³</button>
        <button onclick="addToDisplay('3.14159265359')">π</button>

       <button onclick="sin()">sin</button>
       <button onclick="cos()">cos</button>
       <button onclick="tan()">tan</button>
       <button onclick="log()">log</button>
    </div>

    <div class="history">
        <h3>History</h3>

        <button onclick="clearHistory()">🗑 Clear History</button>

        <ul id="historyList"></ul>
    </div>
    <div class="converter">
       <h2>📏 Unit Converter</h2>

       <input type="number" id="unitInput" placeholder="Enter value">

       <select id="unitType">
            <option value="km-m">Kilometer → Meter</option>
            <option value="m-km">Meter → Kilometer</option>
            <option value="kg-g">Kg → Gram</option>
            <option value="g-kg">Gram → Kg</option>
        </select>

        <button onclick="convertUnit()">Convert</button>

        <p id="unitResult"></p>
    </div>
    <script src="script.js"></script>

</body>
</html>
